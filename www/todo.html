<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Keepit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bulma.css">
    <link rel="stylesheet" href="assets/boxicon/fonts/basic/boxicons.css">
    <link rel="stylesheet" href="css/theme.css">


</head>

<body class="">
    <div class="m-4 my-2 is-flex is-justify-content-end">

        <a class="button mx-2" href="trash.html">
            <i class="bx bx-trash"></i>
        </a>
        <a class="button " href="settings.html">
            <i class="bx bx-gear"></i>
        </a>

    </div>
    <div class="container px-3 py-2">
        <h6 id="" class="title is-6 has-text-grey px-2 ">
            To-Do
        </h6>
        <div id="todoList" class="todo-grid">
            <div class="box">
                <h6 class="title is-6">Judul</h6>
                <hr>
                <label for="" id="" class="is-flex is-justify-content-between checkbox">
                    <input type="checkbox" name="" id="" class="mx-3" class="checkbox">
                     <input type="text" name="" id="" placeholder="Contoh item to-do" class="input is-small">
                </label>

                <div class="is-flex is-justify-content-end mt-4">
                    <button class="button is-small is-link mx-1">
                        Add
                    </button>
                    <button class="button is-small is-danger">
                        Delete
                    </button>
                </div>
            </div>
        </div>


        <p id="emptyState" class="has-text-centered has-text-grey is-hidden">
            Create your first note
        </p>

        <div class="modal p-6" id="deleteModal">

            <section class="box p-4 is-small">
                <p class="title is-5">Delete Note</p>
                <p class="  is-size-6 ">
                    Your note will be moved to Trash
                </p>
                <hr>
                <div class="is-flex is-justify-content-center">

                    <button class="button is-danger m-4 is-link" id="confirmDelete">
                        Delete
                    </button>
                    <button class="button m-4 is-link" id="cancelDelete">
                        Cancel
                    </button>
                </div>
            </section>
        </div>

    </div>

    <!-- Floating Action Button -->
    <div class="fab-container">

        <a href="editor.html" class="button fab-btn is-large">
            <i class='bx bx-plus'></i>
        </a>
    </div>

    <!-- navbar bawah -->

    <div class="bottom-tab">
        <a class="tab-item  p-2" href="index.html">
            Notes
        </a>
        <a class="tab-item is-active p-2" href="#">
            To-Do
        </a>
    </div>

    <script type="module" src="js/app.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
